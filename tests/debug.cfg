# debug.cfg — ca65/ld65 linker configuration for 65816 debug builds
#
# Memory map:
#   ZP:      $00B4-$00FE  zero page variables (runtime scratch, stack shadow, etc.)
#   BSS:     $0200-$05FF  uninitialized data
#   STARTUP: $4000        VM entry point (must be first)
#   CODE:    $4000+       application and runtime code
#
# To link:
#   ld65 -C debug.cfg app.o vmachine.lib -o app.bin
MEMORY {
    ZP:         start = $00B4, size = $004B, type = rw;
    BSS:        start = $0200, size = $3800, fill = no, type = rw;
    RAM:        start = $4000, size = $4000, fill = no, type = rw;
}
SEGMENTS {
    ZEROPAGE:   load = ZP,  type = zp;
    BSS:        load = BSS, type = bss, define = yes;
    STARTUP:    load = RAM, type = ro;
    CODE:       load = RAM, type = ro,  align = $100;
}
